<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Melon Bread / めろんぱん</title>
  <style>
    :root {
      --bg: #f8f3e8;
      --panel: #fffdf8;
      --text: #2d2d2d;
      --muted: #6b6b6b;
      --accent: #6aa84f;
      --accent-2: #d98c3f;
      --shadow: 0 12px 30px rgba(0,0,0,.10);
      --radius: 24px;
      --button-radius: 16px;
      --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --font-display: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-main);
      background:
        radial-gradient(circle at top, rgba(255,255,255,.65), transparent 35%),
        linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 88%, #ffffff 12%));
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      transition: background .35s ease, color .35s ease;
    }

    body.theme-en {
      --bg: #dff2ea;
      --panel: #fffaf0;
      --text: #21313c;
      --muted: #5b6973;
      --accent: #2ea58a;
      --accent-2: #f29b4b;
      --shadow: 0 14px 36px rgba(33,49,60,.14);
      --radius: 28px;
      --button-radius: 999px;
      --font-display: "Trebuchet MS", "Arial Rounded MT Bold", Arial, sans-serif;
    }

    body.theme-ja {
      --bg: #f7f1df;
      --panel: #fffdf8;
      --text: #40372f;
      --muted: #7b7068;
      --accent: #84b96f;
      --accent-2: #e3a85a;
      --shadow: 0 12px 28px rgba(64,55,47,.10);
      --radius: 26px;
      --button-radius: 20px;
      --font-display: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
    }

    .app {
      width: min(100%, 760px);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }

    .app::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.35), transparent 35%);
      pointer-events: none;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.65);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: .04em;
      border: 1px solid rgba(0,0,0,.05);
    }

    .lang-switch {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini-btn {
      border: 1px solid rgba(0,0,0,.08);
      background: rgba(255,255,255,.82);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, border-color .2s ease;
    }

    .mini-btn:hover { transform: translateY(-1px); }
    .mini-btn.active {
      background: color-mix(in srgb, var(--accent) 14%, white 86%);
      border-color: color-mix(in srgb, var(--accent) 36%, white 64%);
    }

    #screen {
      position: relative;
      z-index: 1;
      animation: fadeIn .35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      text-align: center;
      padding: 12px 0 4px;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .logo {
      width: min(100%, 340px);
      border-radius: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
      background: white;
    }

    .ja-logo-text {
      font-family: var(--font-display);
      font-size: clamp(34px, 6vw, 52px);
      line-height: 1;
      margin: 10px 0 6px;
      color: var(--accent);
      letter-spacing: .08em;
    }

    .title {
      margin: 8px 0 10px;
      font-family: var(--font-display);
      font-size: clamp(28px, 4.4vw, 42px);
      line-height: 1.15;
    }

    .subtitle {
      margin: 0 auto;
      max-width: 560px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.8;
    }

    .choices {
      display: grid;
      gap: 12px;
      margin-top: 22px;
    }

    .main-btn, .choice-btn, .secondary-btn {
      appearance: none;
      border: none;
      cursor: pointer;
      transition: transform .14s ease, box-shadow .2s ease, opacity .2s ease;
      font-family: inherit;
    }

    .main-btn:hover, .choice-btn:hover, .secondary-btn:hover { transform: translateY(-1px); }
    .main-btn:active, .choice-btn:active, .secondary-btn:active { transform: translateY(0); }

    .main-btn {
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 78%, white 22%), var(--accent));
      color: white;
      padding: 14px 24px;
      border-radius: var(--button-radius);
      font-size: 16px;
      font-weight: 700;
      box-shadow: 0 8px 20px color-mix(in srgb, var(--accent) 28%, transparent 72%);
    }

    .secondary-btn {
      background: rgba(255,255,255,.72);
      color: var(--text);
      padding: 12px 18px;
      border-radius: var(--button-radius);
      border: 1px solid rgba(0,0,0,.08);
      font-size: 14px;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      background: rgba(255,255,255,.85);
      color: var(--text);
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,.07);
      box-shadow: 0 8px 18px rgba(0,0,0,.04);
      font-size: 15px;
      line-height: 1.6;
    }

    .choice-btn .label {
      font-weight: 700;
      display: block;
      margin-bottom: 3px;
    }

    .scene-tag, .ending-tag {
      display: inline-block;
      background: color-mix(in srgb, var(--accent) 16%, white 84%);
      color: color-mix(in srgb, var(--accent) 78%, black 22%);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .04em;
      margin-bottom: 10px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 24px;
    }

    .meta {
      margin-top: 20px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      border: 1px dashed rgba(0,0,0,.08);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .share-box {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--accent) 8%, white 92%);
      border: 1px solid color-mix(in srgb, var(--accent) 18%, white 82%);
    }

    .share-title {
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .share-text {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 14px;
    }

    .footer-note {
      margin-top: 22px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 640px) {
      .app { padding: 20px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .lang-switch { justify-content: center; }
      .badge { justify-content: center; }
    }
  </style>
</head>

          <div class="choices">
            ${copy.roles.map((role, idx) => `
              <button class="choice-btn" onclick="pickRole(${idx})">
                <span class="label">${role.label}</span>
                <span>${role.desc}</span>
              </button>
            `).join('')}
          </div>
          <div class="actions">
            <button class="secondary-btn" onclick="renderTitle()">${copy.back}</button>
          </div>
        </div>
      `;
    }

    function pickRole(idx) {
      state.role = idx;
      state.scene = 0;
      renderScene();
    }

    function renderScene() {
      const copy = t();
      const idx = state.scene;
      const options = copy.questions[idx];
      screenEl.innerHTML = `
        <div>
          <div class="scene-tag">${copy.sceneLabels[idx]}</div>
          <h2 class="title" style="font-size:clamp(24px,4vw,34px)">${copy.sceneTitles[idx]}</h2>
          <div class="choices">
            ${options.map((item, optIdx) => `
              <button class="choice-btn" onclick="pickChoice(${idx}, ${optIdx})">
                <span class="label">${item.label}</span>
                <span>${item.desc}</span>
              </button>
            `).join('')}
          </div>
          <div class="meta">
            ${state.lang === 'en'
              ? `Role selected: <strong>${copy.roles[state.role].label}</strong> · Your choices shape how the misunderstanding is interpreted.`
              : `えらんだ役割: <strong>${copy.roles[state.role].label}</strong> ・ 同じ誤解でも、選び方しだいで評価が変わります。`}
          </div>
        </div>
      `;
    }

    function pickChoice(sceneIdx, optionIdx) {
      const option = t().questions[sceneIdx][optionIdx];
      state.score += option.score;
      if (state.scene < 2) {
        state.scene += 1;
        renderScene();
      } else {
        renderEnding();
      }
    }

    function getEndingKey() {
      if (state.score >= 5) return 'A';
      if (state.score >= 3) return 'C';
      if (state.score >= 1) return 'D';
      return 'B';
    }

    function renderEnding() {
      const copy = t();
      const endingKey = getEndingKey();
      const ending = copy.endings[endingKey];
      state.shareText = ending.share;
      screenEl.innerHTML = `
        <div>
          <div class="ending-tag">${ending.tag}</div>
          <h2 class="title" style="font-size:clamp(26px,4.2vw,36px)">${ending.title}</h2>
          <p class="subtitle" style="max-width:none">${ending.body}</p>
          <div class="share-box">
            <div class="share-title">${copy.shareTitle}</div>
            <div class="share-text">${ending.share}</div>
          </div>
          <div class="actions">
            <button class="main-btn" onclick="copyShare()">${copy.shareButton}</button>
            <button class="secondary-btn" onclick="startGame()">${copy.retry}</button>
            <button class="secondary-btn" onclick="goHome()">${copy.home}</button>
          </div>
        </div>
      `;
    }

    function copyShare() {
      navigator.clipboard.writeText(state.shareText)
        .then(() => alert(t().copied))
        .catch(() => alert(state.shareText));
    }

    function pickWorld(lang) {
      setLang(lang);
      state.screen = 'title';
      renderTitle();
    }

    function render() {
      if (state.screen === 'world') return renderWorldSelect();
      if (state.screen === 'title') return renderTitle();
      if (state.screen === 'role') return renderRole();
      renderTitle();
    }

    switchEn.addEventListener('click', () => setLang('en'));
    switchJa.addEventListener('click', () => setLang('ja'));

    renderWorldSelect();
  </script>
</body>
</html>
